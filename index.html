        }

        /* Estilo do botão */
        #go {
            padding: 15px 30px;

            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        #go:hover {
            background-color: #e6b800;
            transform: scale(1.1);
        }

        #go:active {
            transform: scale(0.9);
        }
    </style>
